services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      REPORT_EXPORT_REDIS_URL: ${REPORT_EXPORT_REDIS_URL}
      REPORT_EXPORT_SHARED_JOBS_ROOT: ${REPORT_EXPORT_SHARED_JOBS_ROOT}
    ports:
      - "8000:8000"
    volumes:
      - shared-jobs:${REPORT_EXPORT_SHARED_JOBS_ROOT}
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.celery_app worker --loglevel=info
    environment:
      REPORT_EXPORT_REDIS_URL: ${REPORT_EXPORT_REDIS_URL}
      REPORT_EXPORT_SHARED_JOBS_ROOT: ${REPORT_EXPORT_SHARED_JOBS_ROOT}
    volumes:
      - shared-jobs:${REPORT_EXPORT_SHARED_JOBS_ROOT}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine

volumes:
  shared-jobs:
